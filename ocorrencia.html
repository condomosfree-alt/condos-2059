<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocorrência · Cond.OS 2059</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="theme-color" content="#0a1220">
<meta name="robots" content="noindex,nofollow">
<style>
:root{
  --bg:#0a1220; --card:#0f1a2e; --card2:#142440;
  --t1:#e9f1ff; --t2:#8496b4; --t3:#5a6d8c;
  --b:#1e2f4d; --b2:#2a4066;
  --cyan:#00d4ff; --green:#22e584; --red:#ff5470; --amber:#ffb300;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(ellipse 120% 50% at 50% -10%,#0e1930 0%,#0a1220 60%);color:var(--t1);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;padding:0 0 40px;font-size:15px;line-height:1.55}
.top{background:rgba(10,18,32,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--b);padding:14px 20px;position:sticky;top:0;z-index:10}
.top .brand{font-family:'Courier New',monospace;font-weight:700;font-size:14px;letter-spacing:1px}
.top .brand em{color:var(--cyan);font-style:normal}
.top .sub{font-size:9.5px;letter-spacing:2.5px;color:var(--t3);margin-top:-1px}
.wrap{max-width:560px;margin:0 auto;padding:20px}
.selo{display:inline-flex;align-items:center;gap:6px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);
  color:var(--cyan);border-radius:20px;padding:5px 13px;font-size:10.5px;font-weight:700;letter-spacing:.5px;margin-bottom:16px}
h1{font-size:22px;font-weight:600;line-height:1.25;margin-bottom:6px}
.meta{font-size:12.5px;color:var(--t2);margin-bottom:20px}
.card{background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--b);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 6px 24px rgba(0,0,0,.3)}
.card h2{font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.estado{display:inline-block;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700}
.linha{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--b);font-size:13.5px}
.linha:last-child{border-bottom:none}
.linha span:first-child{color:var(--t2)}
.linha span:last-child{font-weight:600;text-align:right}
/* votação */
.vbar{height:12px;border-radius:6px;background:#1a2440;overflow:hidden;display:flex;margin:12px 0 8px}
.vbar i{display:block;height:100%}
.vleg{display:flex;justify-content:space-between;font-family:'Courier New',monospace;font-size:11px;margin-bottom:12px}
.veredito{text-align:center;border-radius:10px;padding:12px;font-size:14px;font-weight:700;margin-top:8px}
.vnums{display:flex;gap:10px;margin-top:10px}
.vnum{flex:1;text-align:center;background:var(--card);border:1px solid var(--b);border-radius:10px;padding:10px}
.vnum b{display:block;font-size:20px;font-family:'Courier New',monospace}
.vnum span{font-size:10px;color:var(--t3)}
/* timeline */
.tl{position:relative;padding-left:20px}
.tl::before{content:'';position:absolute;left:5px;top:6px;bottom:6px;width:2px;background:var(--b2)}
.tli{position:relative;padding:0 0 16px}
.tli:last-child{padding-bottom:0}
.tli::before{content:'';position:absolute;left:-19px;top:5px;width:10px;height:10px;border-radius:50%;background:var(--cyan);border:2px solid var(--bg)}
.tli:last-child::before{background:var(--green)}
.tlt{font-size:13px;line-height:1.5}
.tld{font-size:10.5px;color:var(--t3);font-family:'Courier New',monospace;margin-top:2px}
.rodape{text-align:center;font-size:10.5px;color:var(--t3);margin-top:24px;line-height:1.6}
.rodape strong{color:var(--t2)}
.loading,.erro{text-align:center;padding:60px 20px;color:var(--t2)}
.erro .ic{font-size:44px;margin-bottom:12px}
</style>
</head>
<body>

<div class="top">
  <div class="brand">COND<em>.</em>OS <em>2059</em></div>
  <div class="sub">REGISTO OFICIAL DE OCORRÊNCIA</div>
</div>

<div class="wrap">
  <div id="cont"><div class="loading">A carregar registo…</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL = 'https://iopkxoabszhzjimjltir.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvcGt4b2Fic3poemppbWpsdGlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzc5MjQsImV4cCI6MjA5Njg1MzkyNH0.PwopXnx0v7kSXUeua1Y3fI3xPDIS8S62SzGBfwPwLSA';
const sb = supabase.createClient(SB_URL, SB_KEY);

const params = new URLSearchParams(location.search);
const token = params.get('t');

const ESTADOS = {
  aberta:{txt:'Recebida',cor:'var(--amber)',bg:'rgba(255,179,0,.12)'},
  parceiro_contactado:{txt:'Parceiro contactado',cor:'var(--cyan)',bg:'rgba(0,212,255,.12)'},
  aguarda_orcamento:{txt:'Aguarda orçamento',cor:'var(--cyan)',bg:'rgba(0,212,255,.12)'},
  aguarda_votacao:{txt:'Em votação',cor:'var(--amber)',bg:'rgba(255,179,0,.12)'},
  aprovada:{txt:'Aprovada',cor:'var(--green)',bg:'rgba(34,229,132,.12)'},
  em_reparacao:{txt:'Em reparação',cor:'var(--cyan)',bg:'rgba(0,212,255,.12)'},
  resolvida:{txt:'Resolvida',cor:'var(--green)',bg:'rgba(34,229,132,.12)'},
  fechada:{txt:'Fechada',cor:'var(--t3)',bg:'rgba(90,109,140,.12)'}
};
const eur = v => parseFloat(v||0).toFixed(2).replace('.',',') + '€';
const dt = s => s ? new Date(s).toLocaleString('pt-PT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
const esc = s => String(s||'').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));

async function carregar() {
  const cont = document.getElementById('cont');
  if (!token) { cont.innerHTML = '<div class="erro"><div class="ic">🔒</div><div>Link inválido.</div></div>'; return; }

  const [ro, rt] = await Promise.all([
    sb.rpc('ocorrencia_publica', { p_token: token }),
    sb.rpc('ocorrencia_publica_timeline', { p_token: token })
  ]);

  if (ro.error || !ro.data || !ro.data.length) {
    cont.innerHTML = '<div class="erro"><div class="ic">🔍</div><div>Registo não encontrado.<br><span style="font-size:11px;color:var(--t3)">O link pode estar errado ou ter sido removido.</span></div></div>';
    return;
  }
  const o = ro.data[0];
  const eventos = rt.data || [];
  const est = ESTADOS[o.estado] || {txt:o.estado,cor:'var(--t2)',bg:'rgba(132,150,180,.12)'};

  let h = '<div class="selo">📋 DOCUMENTO VERIFICÁVEL</div>';
  h += '<h1>' + esc(o.categoria || 'Ocorrência') + (o.local_ocorrencia ? ' — ' + esc(o.local_ocorrencia) : '') + '</h1>';
  h += '<div class="meta">' + esc(o.condominio_nome||'') + ' · registada a ' + dt(o.criado_em) + '</div>';

  // Estado + dados
  h += '<div class="card">';
  h += '<h2>Situação</h2>';
  h += '<span class="estado" style="background:'+est.bg+';color:'+est.cor+';">'+est.txt+'</span>';
  h += '<div style="margin-top:14px;">';
  if (o.descricao) h += '<div class="linha"><span>Descrição</span><span style="max-width:60%;font-weight:400;color:var(--t1);">'+esc(o.descricao)+'</span></div>';
  if (o.parceiro_nome) h += '<div class="linha"><span>Empresa</span><span>'+esc(o.parceiro_nome)+'</span></div>';
  if (o.orcamento_valor) h += '<div class="linha"><span>Orçamento</span><span style="color:var(--cyan);">'+eur(o.orcamento_valor)+'</span></div>';
  if (o.orcamento_nota) h += '<div class="linha"><span>Trabalho</span><span style="max-width:60%;font-weight:400;color:var(--t1);">'+esc(o.orcamento_nota)+'</span></div>';
  if (o.divisao_metodo) {
    const dv = String(o.divisao_metodo).indexOf('bloco:')===0 ? ('Só o Bloco '+String(o.divisao_metodo).split(':')[1]) : 'Permilagem geral (Art. 1424.º CC)';
    h += '<div class="linha"><span>Divisão do custo</span><span>'+dv+'</span></div>';
  }
  if (o.data_resolucao) h += '<div class="linha"><span>Resolvida a</span><span style="color:var(--green);">'+dt(o.data_resolucao)+'</span></div>';
  h += '</div></div>';

  // VOTAÇÃO — a peça que resolve conflitos
  if (o.precisa_votacao) {
    const pSim = parseFloat(o.perm_sim||0), pNao = parseFloat(o.perm_nao||0), pTot = parseFloat(o.perm_total||0);
    const pctSim = pTot>0 ? (pSim/pTot*100) : 0;
    const pctNao = pTot>0 ? (pNao/pTot*100) : 0;
    h += '<div class="card">';
    h += '<h2>🗳️ Votação dos condóminos</h2>';
    h += '<div class="vbar"><i style="width:'+pctSim+'%;background:var(--green);"></i><i style="width:'+pctNao+'%;background:var(--red);"></i></div>';
    h += '<div class="vleg"><span style="color:var(--green);">A FAVOR '+pSim.toFixed(1)+'‰ ('+pctSim.toFixed(1)+'%)</span><span style="color:var(--red);">CONTRA '+pNao.toFixed(1)+'‰</span></div>';
    h += '<div class="vnums">';
    h += '<div class="vnum"><b style="color:var(--green);">'+(o.votos_sim||0)+'</b><span>a favor</span></div>';
    h += '<div class="vnum"><b style="color:var(--red);">'+(o.votos_nao||0)+'</b><span>contra</span></div>';
    h += '<div class="vnum"><b style="color:var(--cyan);">'+pTot.toFixed(0)+'‰</b><span>permilagem do grupo</span></div>';
    h += '</div>';
    // O VEREDITO — o que acaba com as discussões
    if (pctSim > 50) {
      h += '<div class="veredito" style="background:rgba(34,229,132,.12);color:var(--green);border:1px solid rgba(34,229,132,.35);">✅ APROVADO — maioria de permilagem atingida<div style="font-size:10.5px;font-weight:400;color:var(--t2);margin-top:4px;">Art. 1432.º CC: os votos contam pela permilagem, não por cabeça</div></div>';
    } else if (pctNao > 50) {
      h += '<div class="veredito" style="background:rgba(255,84,112,.12);color:var(--red);border:1px solid rgba(255,84,112,.35);">❌ REJEITADO — maioria contra</div>';
    } else {
      h += '<div class="veredito" style="background:rgba(255,179,0,.1);color:var(--amber);border:1px solid rgba(255,179,0,.3);">⏳ SEM MAIORIA — votação em curso<div style="font-size:10.5px;font-weight:400;color:var(--t2);margin-top:4px;">Faltam '+(50-pctSim).toFixed(1)+'% de permilagem para aprovar</div></div>';
    }
    h += '</div>';
  }

  // TIMELINE — o histórico completo
  if (eventos.length) {
    h += '<div class="card"><h2>📜 Histórico completo</h2><div class="tl">';
    eventos.forEach(function(e){
      h += '<div class="tli"><div class="tlt">'+esc(e.texto)+'</div><div class="tld">'+dt(e.criado_em)+'</div></div>';
    });
    h += '</div></div>';
  }

  h += '<div class="rodape">';
  h += '<strong>Este registo é gerado automaticamente pelo Cond.OS 2059.</strong><br>';
  h += 'Os dados são lidos diretamente do sistema de gestão do condomínio e não podem ser alterados por quem consulta este link.<br>';
  h += 'Consultado a ' + new Date().toLocaleString('pt-PT');
  h += '</div>';

  cont.innerHTML = h;
}
carregar();
</script>
</body>
</html>
